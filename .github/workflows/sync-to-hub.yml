name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_TOKEN="$(printf '%s' "$HF_TOKEN" | tr -d '\n\r')"
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is empty. Add a Write token at https://huggingface.co/settings/tokens"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push "https://akshay4:${HF_TOKEN}@huggingface.co/spaces/build-small-hackathon/WitGym" HEAD:main --force
