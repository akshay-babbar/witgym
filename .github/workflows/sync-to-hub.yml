name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_TOKEN="$(printf '%s' "$HF_TOKEN" | tr -d '\n\r')"
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is empty. Add a Write token at https://huggingface.co/settings/tokens"
            exit 1
          fi
          pip install -q "huggingface_hub>=0.22"
          hf upload build-small-hackathon/WitGym . . \
            --repo-type space \
            --token "$HF_TOKEN" \
            --exclude=".git*" \
            --exclude=".github*" \
            --delete="*"
